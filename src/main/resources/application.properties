# ===========================================
#  Aplicacion
# ===========================================
spring.application.name=gestion-hexagonal
server.port=8080

# ===========================================
#  Base de datos MySQL
#  (cree primero:  CREATE DATABASE gestion_hexagonal;)
# ===========================================
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_hexagonal?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================================
#  JPA / Hibernate
# ===========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
#  JWT
#  (la clave debe tener al menos 32 caracteres para HS256)
# ===========================================
app.jwt.secret=clave-secreta-unicartagena-gestion-hexagonal-2026-muy-larga
app.jwt.expiration-ms=86400000
